name: AKS Newsletter – Monthly Collection

on:
  schedule:
    # Run at 18:00 UTC on the last day of each month
    # Cron doesn't support "last day", so we run on the 28th-31st and check
    - cron: '0 18 28-31 * *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Target year (e.g., 2026)'
        required: false
      month:
        description: 'Target month (1-12)'
        required: false

jobs:
  collect-and-generate:
    runs-on: ubuntu-latest

    # Only run on the actual last day of the month (for scheduled runs)
    # workflow_dispatch always runs
    steps:
      - name: Check if last day of month
        id: check-date
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_last_day=true" >> $GITHUB_OUTPUT
          else
            today=$(date +%d)
            tomorrow=$(date -d "+1 day" +%d)
            # If tomorrow's day (01) < today's day, today is the last day
            if [ "$tomorrow" -lt "$today" ]; then
              echo "is_last_day=true" >> $GITHUB_OUTPUT
            else
              echo "is_last_day=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Checkout repository
        if: steps.check-date.outputs.is_last_day == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check-date.outputs.is_last_day == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-date.outputs.is_last_day == 'true'
        run: npm install

      - name: Determine target month
        if: steps.check-date.outputs.is_last_day == 'true'
        id: target
        run: |
          if [ -n "${{ inputs.year }}" ] && [ -n "${{ inputs.month }}" ]; then
            echo "year=${{ inputs.year }}" >> $GITHUB_OUTPUT
            echo "month=${{ inputs.month }}" >> $GITHUB_OUTPUT
          else
            echo "year=$(date +%Y)" >> $GITHUB_OUTPUT
            echo "month=$(date +%-m)" >> $GITHUB_OUTPUT
          fi

      - name: Check if newsletter already exists
        if: steps.check-date.outputs.is_last_day == 'true'
        id: check-existing
        run: |
          MONTH_PAD=$(printf '%02d' ${{ steps.target.outputs.month }})
          NEWSLETTER_FILE="newsletters/${{ steps.target.outputs.year }}/${{ steps.target.outputs.year }}-${MONTH_PAD}.md"
          if [ -f "$NEWSLETTER_FILE" ]; then
            echo "::notice::Newsletter already exists at $NEWSLETTER_FILE — skipping generation to avoid overwriting a polished edition."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "No existing newsletter found, proceeding with generation."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run AKS Newsletter Agent (collect)
        if: steps.check-date.outputs.is_last_day == 'true' && steps.check-existing.outputs.exists != 'true'
        run: node run.js ${{ steps.target.outputs.year }} ${{ steps.target.outputs.month }} --collect-only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run AKS Newsletter Agent (generate draft)
        if: steps.check-date.outputs.is_last_day == 'true' && steps.check-existing.outputs.exists != 'true'
        run: node run.js ${{ steps.target.outputs.year }} ${{ steps.target.outputs.month }} --generate-only

      - name: Quality gate – check content completeness
        if: steps.check-date.outputs.is_last_day == 'true' && steps.check-existing.outputs.exists != 'true'
        run: |
          MONTH_PAD=$(printf '%02d' ${{ steps.target.outputs.month }})
          FILE="newsletters/${{ steps.target.outputs.year }}/${{ steps.target.outputs.year }}-${MONTH_PAD}.md"
          if [ ! -f "$FILE" ]; then
            echo "::error::Newsletter file not generated: $FILE"
            exit 1
          fi
          # Check each expected section has at least one linked item
          WARNINGS=0
          for SECTION in "Documentation Updates" "Preview Feature" "General Availability" "Behavioral Changes" "Community Blogs"; do
            CONTENT=$(sed -n "/## .*${SECTION}/,/## /p" "$FILE" | grep -c '\*\*\[' || true)
            if [ "$CONTENT" -eq 0 ]; then
              echo "::warning::Section '$SECTION' has no linked items — may need manual review."
              WARNINGS=$((WARNINGS + 1))
            fi
          done
          TOTAL=$(grep -c '\*\*\[' "$FILE" || true)
          echo "📊 Quality gate: $TOTAL total items, $WARNINGS empty sections"
          if [ "$TOTAL" -lt 3 ]; then
            echo "::warning::Newsletter has very few items ($TOTAL). Consider investigating data collection."
          fi

      - name: Upload collected data
        if: steps.check-date.outputs.is_last_day == 'true' && steps.check-existing.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ steps.target.outputs.year }}-${{ steps.target.outputs.month }}
          path: |
            collected/*.json
            newsletters/**/*.md
          retention-days: 90

      - name: Create Pull Request with draft
        if: steps.check-date.outputs.is_last_day == 'true' && steps.check-existing.outputs.exists != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add AKS Newsletter draft for ${{ steps.target.outputs.year }}-${{ steps.target.outputs.month }}"
          title: "📰 AKS Newsletter Draft – ${{ steps.target.outputs.year }}-${{ steps.target.outputs.month }}"
          body: |
            ## Automated Newsletter Draft

            This PR contains the collected data and generated draft for the monthly AKS Newsletter.

            **Target month:** ${{ steps.target.outputs.year }}-${{ steps.target.outputs.month }}

            ### Files
            - `collected/${{ steps.target.outputs.year }}-${{ steps.target.outputs.month }}.json` – Raw collected data
            - `newsletters/${{ steps.target.outputs.year }}/${{ steps.target.outputs.year }}-${{ steps.target.outputs.month }}.md` – Draft newsletter

            ### Next steps
            1. Review the collected data JSON for completeness
            2. Use `agent_prompt.md` with an AI assistant to polish the draft
            3. Replace the draft with the polished version
            4. Merge when ready to publish
          branch: newsletter/${{ steps.target.outputs.year }}-${{ steps.target.outputs.month }}
          delete-branch: true

      - name: Send webhook notification
        if: steps.check-date.outputs.is_last_day == 'true' && steps.check-existing.outputs.exists != 'true'
        continue-on-error: true
        run: |
          MONTH_PAD=$(printf '%02d' ${{ steps.target.outputs.month }})
          MONTH_NAMES=("" "January" "February" "March" "April" "May" "June" "July" "August" "September" "October" "November" "December")
          MONTH_NAME=${MONTH_NAMES[${{ steps.target.outputs.month }}]}
          PR_URL="${{ github.server_url }}/${{ github.repository }}/pulls"

          # Slack webhook (if configured)
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"📰 AKS Newsletter draft for ${MONTH_NAME} ${{ steps.target.outputs.year }} is ready for review!\nPR: ${PR_URL}\"}"
          fi

          # Teams webhook (if configured)
          if [ -n "$TEAMS_WEBHOOK_URL" ]; then
            curl -s -X POST "$TEAMS_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"📰 AKS Newsletter draft for ${MONTH_NAME} ${{ steps.target.outputs.year }} is ready for review! PR: ${PR_URL}\"}"
          fi

          echo "✅ Webhook notifications sent (if configured)"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
